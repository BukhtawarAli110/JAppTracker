services:
  - type: web
    name: job-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --threads 4 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # All other env vars (DB, SMTP, APP_PASSWORD, etc.)
      # are set manually in the Render dashboard.
